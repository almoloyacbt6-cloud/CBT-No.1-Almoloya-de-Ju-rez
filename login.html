<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | CBT No. 1 Almoloya de Juárez</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body {
            background: url('https://i.pinimg.com/736x/ff/6b/f2/ff6bf23e7939442da518f28c989b84c8.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 46, 22, 0.85); 
            z-index: 1;
        }
        
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 400px;
        }
        
        .login-card img {
            width: 100px;
            margin-bottom: 20px;
        }
        
        .login-card h2 {
            color: #064e3b;
            margin-bottom: 10px;
        }
        
        .login-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        
        .google-btn-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #064e3b;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #fbbf24;
        }
    </style>
</head>
<body>

    <div class="login-overlay"></div>

    <div class="login-card">
        <img src="Logo de la escuela.jpeg" alt="Escudo CBT No. 1">
        
        <h2>Bienvenido</h2>
        <p>Acceso exclusivo para alumnos y personal del CBT No. 1 Almoloya de Juárez</p>

        <div id="g_id_onload"
             data-client_id="427853018714-7trkeh028af8s7g3ekhen8g5un29g290.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="manejarRespuestaGoogle"
             data-auto_prompt="false">
        </div>

        <div class="google-btn-container">
            <div class="g_id_signin"
                 data-type="standard"
                 data-shape="rectangular"
                 data-theme="outline"
                 data-text="signin_with"
                 data-size="large"
                 data-logo_alignment="left">
            </div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        function manejarRespuestaGoogle(response) {
            const datosUsuario = decodificarJwt(response.credential);
            
            // --- NUEVO: Guardamos el nombre y la FOTO en la memoria del navegador ---
            localStorage.setItem('user_name', datosUsuario.name);
            localStorage.setItem('user_photo', datosUsuario.picture);
            
            Swal.fire({
                title: '¡Acceso Exitoso!',
                text: 'Bienvenido/a, ' + datosUsuario.name,
                icon: 'success',
                confirmButtonColor: '#064e3b',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = "index.html";
            });
        }

        function decodificarJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>
</body>
</html>
